<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" fill="none">
  <!-- EarthLab text -->
  <text x="0" y="33" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="0.5">EarthLab</text>

  <!-- Dotted globe without orbital ring -->
  <g transform="translate(155, 2) scale(0.5)">
    <!-- Row 1 - top -->
    <circle cx="45" cy="6" r="3" fill="#2563eb"/>
    <circle cx="55" cy="4" r="2.8" fill="#2563eb"/>
    <circle cx="35" cy="4" r="2.8" fill="#2563eb"/>

    <!-- Row 2 -->
    <circle cx="25" cy="15" r="3.3" fill="#2563eb"/>
    <circle cx="36" cy="14" r="3.5" fill="#2563eb"/>
    <circle cx="47" cy="13" r="3.5" fill="#2563eb"/>
    <circle cx="58" cy="14" r="3.5" fill="#2563eb"/>
    <circle cx="68" cy="15" r="3.3" fill="#2563eb"/>

    <!-- Row 3 -->
    <circle cx="18" cy="26" r="3.5" fill="#2070b0"/>
    <circle cx="29" cy="25" r="3.8" fill="#2070b0"/>
    <circle cx="40" cy="24" r="3.8" fill="#2070b0"/>
    <circle cx="51" cy="24" r="3.8" fill="#2070b0"/>
    <circle cx="62" cy="25" r="3.8" fill="#2070b0"/>
    <circle cx="73" cy="26" r="3.5" fill="#2070b0"/>

    <!-- Row 4 - equator -->
    <circle cx="13" cy="38" r="3.8" fill="#1a8a6a"/>
    <circle cx="24" cy="37" r="4" fill="#1a8a6a"/>
    <circle cx="35" cy="36" r="4.2" fill="#1a8a6a"/>
    <circle cx="46" cy="36" r="4.2" fill="#1a8a6a"/>
    <circle cx="57" cy="36" r="4.2" fill="#1a8a6a"/>
    <circle cx="68" cy="37" r="4" fill="#1a8a6a"/>
    <circle cx="79" cy="38" r="3.8" fill="#1a8a6a"/>

    <!-- Row 5 -->
    <circle cx="17" cy="49" r="3.5" fill="#1a9d5a"/>
    <circle cx="28" cy="48" r="3.8" fill="#1a9d5a"/>
    <circle cx="39" cy="47" r="3.8" fill="#1a9d5a"/>
    <circle cx="50" cy="47" r="3.8" fill="#1a9d5a"/>
    <circle cx="61" cy="48" r="3.8" fill="#1a9d5a"/>
    <circle cx="72" cy="49" r="3.5" fill="#1a9d5a"/>

    <!-- Row 6 -->
    <circle cx="24" cy="59" r="3.2" fill="#16a34a"/>
    <circle cx="35" cy="58" r="3.5" fill="#16a34a"/>
    <circle cx="46" cy="58" r="3.5" fill="#16a34a"/>
    <circle cx="57" cy="58" r="3.5" fill="#16a34a"/>
    <circle cx="67" cy="59" r="3.2" fill="#16a34a"/>

    <!-- Row 7 -->
    <circle cx="34" cy="68" r="3" fill="#16a34a"/>
    <circle cx="45" cy="67" r="3.2" fill="#16a34a"/>
    <circle cx="56" cy="68" r="3" fill="#16a34a"/>

    <!-- Bottom cap -->
    <circle cx="45" cy="75" r="2.5" fill="#16a34a"/>
  </g>

  <!-- >_ command line symbol -->
  <g transform="translate(210, 8)">
    <!-- > chevron -->
    <polyline points="0,2 12,16 0,30" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- _ underscore/cursor -->
    <line x1="16" y1="30" x2="30" y2="30" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
